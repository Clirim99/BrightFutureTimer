<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timer Digjital</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="timer-container">
        <!-- Titulli që mund të ndryshohet duke klikuar mbi të -->
        <h1 class="timer-title" contenteditable="true">Provimi pranues në BRIGHT</h1>
        
        <!-- Ekrani i kohës -->
        <div class="timer-display" id="display">01:22:56</div>

        <!-- Katër butonat e kontrollit -->
        <div class="control-buttons">
            <button id="btn-edit" class="btn edit">Edit Timer</button>
            <button id="btn-reset" class="btn reset">Reset</button>
            <button id="btn-start" class="btn start">Start</button>
            <button id="btn-stop" class="btn stop">Stop</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
